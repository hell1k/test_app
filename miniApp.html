<!DOCTYPE html>
<html lang="ru">
<head>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Счетчик лайков для группы</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        .header {
            margin-bottom: 30px;
        }

        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(45deg, #667eea, #764ba2);
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: white;
        }

        h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .user-info {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(45deg, #4CAF50, #8BC34A);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 20px;
        }

        .user-details {
            text-align: left;
            flex: 1;
        }

        .username {
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }

        .likes-count {
            font-size: 12px;
            color: #666;
        }

        .counter {
            background: linear-gradient(45deg, #FF6B6B, #FF8E53);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 25px;
            color: white;
        }

        .counter-number {
            font-size: 64px;
            font-weight: bold;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .counter-label {
            font-size: 18px;
            opacity: 0.9;
        }

        .buttons {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }

        .btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-like {
            background: linear-gradient(45deg, #4CAF50, #8BC34A);
            color: white;
        }

        .btn-like:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.4);
        }

        .btn-share {
            background: #f8f9fa;
            color: #333;
            border: 2px solid #e9ecef;
        }

        .btn-share:hover {
            background: #e9ecef;
        }

        .leaderboard {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
        }

        .leaderboard h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .leaderboard-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid #e9ecef;
        }

        .leaderboard-item:last-child {
            border-bottom: none;
        }

        .leaderboard-rank {
            width: 30px;
            height: 30px;
            background: #667eea;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 14px;
        }

        .leaderboard-name {
            flex: 1;
            text-align: left;
            padding-left: 15px;
            color: #333;
        }

        .leaderboard-likes {
            color: #FF6B6B;
            font-weight: bold;
        }

        .emoji {
            font-size: 20px;
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #4CAF50;
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            opacity: 0;
            transform: translateX(100px);
            transition: all 0.3s ease;
        }

        .notification.show {
            opacity: 1;
            transform: translateX(0);
        }

        @media (max-width: 480px) {
            .container {
                padding: 20px;
            }

            .buttons {
                flex-direction: column;
            }

            .counter-number {
                font-size: 48px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">❤️</div>
            <h1>Счетчик лайков</h1>
            <div class="subtitle">Лайкайте участников вашей группы!</div>
        </div>

        <div class="user-info">
            <div class="avatar" id="userAvatar">U</div>
            <div class="user-details">
                <div class="username" id="userName">Пользователь</div>
                <div class="likes-count">Ваши лайки: <span id="userLikes">0</span></div>
            </div>
        </div>

        <div class="counter">
            <div class="counter-number" id="totalLikes">0</div>
            <div class="counter-label">Всего лайков в группе</div>
        </div>

        <div class="buttons">
            <button class="btn btn-like" id="likeBtn">
                <span class="emoji">👍</span> Поставить лайк
            </button>
            <button class="btn btn-share" id="shareBtn">
                <span class="emoji">📢</span> Поделиться
            </button>
        </div>

        <div class="leaderboard">
            <h3>🏆 Топ участников</h3>
            <div id="leaderboardList">
                <div class="leaderboard-item">
                    <div class="leaderboard-rank">1</div>
                    <div class="leaderboard-name">Алексей</div>
                    <div class="leaderboard-likes">42 лайка</div>
                </div>
                <div class="leaderboard-item">
                    <div class="leaderboard-rank">2</div>
                    <div class="leaderboard-name">Мария</div>
                    <div class="leaderboard-likes">38 лайков</div>
                </div>
                <div class="leaderboard-item">
                    <div class="leaderboard-rank">3</div>
                    <div class="leaderboard-name">Иван</div>
                    <div class="leaderboard-likes">25 лайков</div>
                </div>
            </div>
        </div>
    </div>

    <div class="notification" id="notification">
        Лайк успешно поставлен! 🎉
    </div>

    <script>
        // Имитация данных пользователя Telegram
        const telegramUser = {
            id: 123456789,
            firstName: "Алексей",
            lastName: "Петров",
            username: "alexey_petrov",
            photoUrl: null
        };

        // Инициализация приложения
        document.addEventListener('DOMContentLoaded', function() {
            // Заполняем информацию о пользователе
            document.getElementById('userName').textContent = telegramUser.firstName;
            document.getElementById('userAvatar').textContent = telegramUser.firstName.charAt(0);

            // Имитация данных из "базы данных"
            let totalLikes = 127;
            let userLikes = 15;

            document.getElementById('totalLikes').textContent = totalLikes;
            document.getElementById('userLikes').textContent = userLikes;

            // Обработчик кнопки лайка
            document.getElementById('likeBtn').addEventListener('click', function() {
                totalLikes++;
                userLikes++;

                document.getElementById('totalLikes').textContent = totalLikes;
                document.getElementById('userLikes').textContent = userLikes;

                // Показываем уведомление
                showNotification('Лайк успешно поставлен! 🎉');

                // Имитация отправки данных на сервер
                setTimeout(() => {
                    console.log('Лайк отправлен на сервер:', {
                        userId: telegramUser.id,
                        timestamp: new Date().toISOString()
                    });
                }, 100);
            });

            // Обработчик кнопки поделиться
            document.getElementById('shareBtn').addEventListener('click', function() {
                // В реальном Mini App здесь будет вызов Telegram WebApp.share()
                showNotification('Ссылка скопирована в буфер обмена! 📋');

                // Имитация копирования ссылки
                const shareUrl = `https://t.me/share/url?url=${encodeURIComponent(window.location.href)}&text=${encodeURIComponent('Присоединяйтесь к нашему счетчику лайков!')}`;
                console.log('Share URL:', shareUrl);
            });

            // Функция показа уведомления
            function showNotification(message) {
                const notification = document.getElementById('notification');
                notification.textContent = message;
                notification.classList.add('show');

                setTimeout(() => {
                    notification.classList.remove('show');
                }, 3000);
            }

            // Имитация обновления лидерборда
            setInterval(() => {
                // В реальном приложении здесь был бы запрос к серверу
                const leaderboardItems = document.querySelectorAll('.leaderboard-likes');
                leaderboardItems.forEach((item, index) => {
                    const current = parseInt(item.textContent);
                    const newValue = current + Math.floor(Math.random() * 3);
                    item.textContent = `${newValue} лайк${getPlural(newValue)}`;
                });
            }, 10000); // Обновление каждые 10 секунд

            function getPlural(number) {
                const lastDigit = number % 10;
                const lastTwoDigits = number % 100;

                if (lastTwoDigits >= 11 && lastTwoDigits <= 19) return 'ов';
                if (lastDigit === 1) return '';
                if (lastDigit >= 2 && lastDigit <= 4) return 'а';
                return 'ов';
            }

            // Логирование для отладки
            console.log('Telegram Mini App инициализирован');
            console.log('Пользователь:', telegramUser);
        });
    </script>
</body>
</html>
